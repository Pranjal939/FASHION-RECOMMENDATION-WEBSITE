<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Trendify</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-card">
    <h2 class="brand">🔐 Admin Login</h2>
    <p class="subtitle">Access the admin panel</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div style="padding: 10px; margin-bottom: 15px; border-radius: 8px; 
                     background: {% if category == 'success' %}#d4edda{% else %}#f8d7da{% endif %}; 
                     color: {% if category == 'success' %}#155724{% else %}#721c24{% endif %};">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Admin Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="auth-btn">Login</button>
    </form>

    <div class="switch">
        <a href="{{ url_for('home') }}">← Back to Website</a>
    </div>
</div>

</body>
</html>
