{% extends "admin/admin_base.html" %}

{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 600px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #172b6b;
        font-weight: bold;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .btn-group {
        display: flex;
        gap: 10px;
    }

    .submit-btn {
        background: #ffc107;
        color: #000;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
    }

    .submit-btn:hover {
        background: #e0a800;
    }

    .cancel-btn {
        background: #6c757d;
        color: white;
        padding: 12px 25px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        display: inline-block;
    }

    .cancel-btn:hover {
        background: #5a6268;
    }
</style>
{% endblock %}

{% block content %}

<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="name" value="{{ product.name }}" required>
        </div>

        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" name="price" step="0.01" value="{{ product.price }}" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" required>{{ product.description }}</textarea>
        </div>

        <div class="form-group">
            <label>Quality</label>
            <input type="text" name="quality" value="{{ product.quality }}" required>
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number" name="quantity" value="{{ product.quantity }}" required>
        </div>

        <div class="form-group">
            <label>Size</label>
            <input type="text" name="size" value="{{ product.size }}" required>
        </div>

        <div class="form-group">
            <label>Image Filename</label>
            <input type="text" name="image" value="{{ product.image }}" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category_id" required>
                <option value="1" {% if product.category_id == 1 %}selected{% endif %}>Trending</option>
                <option value="2" {% if product.category_id == 2 %}selected{% endif %}>Occasion</option>
            </select>
        </div>

        <div class="btn-group">
            <button type="submit" class="submit-btn">Update Product</button>
            <a href="{{ url_for('admin_products') }}" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
